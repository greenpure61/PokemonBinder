name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # No live DB or real auth is used in CI. These dummy values satisfy env
      # validation (src/lib/env.ts) and Prisma client construction during
      # `next build`; nothing actually connects or authenticates (lint,
      # typecheck, unit tests, and the build don't open a connection).
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
      GOOGLE_CLIENT_ID: "ci-dummy-client-id"
      GOOGLE_CLIENT_SECRET: "ci-dummy-client-secret"
      NEXTAUTH_SECRET: "ci-dummy-nextauth-secret"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
