<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Binder</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0e1a;
        color: rgba(255, 255, 255, 0.9);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        text-align: center;
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0;
      }
      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <!--
      Offline fallback only. The app normally loads the remote site set in
      capacitor.config.ts (server.url). This screen appears if that URL can't be reached.
    -->
    <div class="wrap">
      <h1>You're offline</h1>
      <p>Binder needs a connection. Check your network and try again.</p>
    </div>
  </body>
</html>
